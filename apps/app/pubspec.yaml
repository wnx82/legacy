name: legacy_app
description: "Legacy — préparer l'après, accompagner ceux qu'on aime. Application Android, iOS, Windows, macOS et Linux."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation déclarative — une seule source de vérité pour les routes,
  # cohérente entre mobile et desktop.
  go_router: ^14.6.1

  # Appels HTTP vers l'API NestJS.
  http: ^1.2.2

  # Stockage sécurisé du token d'accès (Keychain/Keystore/libsecret selon la
  # plateforme) — jamais de token en SharedPreferences en clair.
  flutter_secure_storage: ^9.2.2

  # Authentification OpenID Connect (Keycloak) via AppAuth (Authorization
  # Code + PKCE). Supporté nativement sur Android/iOS ; le flux desktop
  # (Windows/macOS/Linux) nécessite un gestionnaire de callback additionnel
  # — voir README.md, section "Authentification desktop".
  flutter_appauth: ^7.0.1

  # Sélection de fichiers pour l'ajout de documents (toutes plateformes).
  file_picker: ^8.1.3

  # Ouverture du navigateur système pour le flux OIDC desktop (loopback).
  url_launcher: ^6.3.0

  # Hachage SHA-256 pour le code_challenge PKCE (flux desktop).
  crypto: ^3.0.5

  # Formatage des dates en français.
  intl: ^0.19.0

  # Gestion d'état simple et explicite.
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
