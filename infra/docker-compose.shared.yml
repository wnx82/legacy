# =============================================================================
# Legacy — Docker Compose (production / Komodo, infrastructure PARTAGÉE)
#
# À la différence de infra/docker-compose.yml (pile de DÉVELOPPEMENT auto-portée
# qui démarre son propre PostgreSQL / MinIO / Keycloak), ce fichier branche
# l'API Legacy sur l'infrastructure partagée déjà en place :
#
#   - PostgreSQL partagé + PgBouncer  → réseau externe `shared-db` (alias
#     `pgbouncer`, `pgbouncer-shared`, `pg-shared`)
#   - Garage S3 partagé               → même réseau `shared-db` (alias `garage`)
#
# Les identifiants proviennent EXCLUSIVEMENT de fichiers de secrets montés sur
# l'hôte (mode 600), jamais du dépôt ni d'une section `environment` :
#
#   /srv/shared-db/secrets/legacy.env     → DATABASE_URL, DATABASE_URL_DIRECT,
#                                            PG*, PGMAXPROTOCOLVERSION
#   /srv/shared-media/secrets/legacy.env  → S3_ENDPOINT, S3_REGION, S3_BUCKET,
#                                            S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
#                                            PUBLIC_BASE_URL
#
# Komodo/Periphery doit avoir accès en lecture à ces deux chemins (bind mount
# déjà en place pour les autres stacks).
#
# Lancement (exemple) :
#   docker compose -f infra/docker-compose.shared.yml up -d
# =============================================================================

name: legacy

services:
  # ---------------------------------------------------------------------------
  # API — NestJS. Ne démarre AUCUNE base ni stockage : tout est partagé.
  # ---------------------------------------------------------------------------
  legacy-api:
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: production
    container_name: legacy-api
    restart: unless-stopped
    env_file:
      # Variables NON secrètes du déploiement (APP_ENV, URLs applicatives,
      # GITHUB_*, APP_VERSION, Keycloak public…). Chargé en premier.
      - ../.env
      # Secrets injectés en dernier → priorité sur toute valeur précédente.
      # Ces fichiers ne sont jamais copiés dans l'image ni versionnés.
      - /srv/shared-db/secrets/legacy.env
      - /srv/shared-media/secrets/legacy.env
    environment:
      APP_ENV: production
      # Redis reste local à la pile (file BullMQ) — pas fourni par shared-db.
      REDIS_URL: redis://redis:6379
    networks:
      - shared-db
      - default
    depends_on:
      redis:
        condition: service_healthy
    # Pas de `ports:` — l'exposition publique passe par le reverse proxy externe.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — file de jobs BullMQ (PDF, e-mails, exports, rappels). Local à la
  # pile : l'infrastructure partagée ne fournit que PostgreSQL et Garage.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: legacy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  # Réseau externe donnant accès à PgBouncer, PostgreSQL direct et Garage S3.
  # Créé et géré par la stack d'infrastructure partagée.
  shared-db:
    external: true
  default:

volumes:
  redis_data:
