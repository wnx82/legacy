
# =============================================================================
# Legacy — Docker Compose (environnement de développement local)
#
# Lancer depuis la racine du monorepo :
#   pnpm infra:up
# ou directement :
#   docker compose -f infra/docker-compose.yml --env-file ../.env up -d
# =============================================================================

name: legacy

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — une seule instance, 3 bases logiques : legacy / keycloak / umami
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: legacy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legacy
      POSTGRES_PASSWORD: legacy
      POSTGRES_DB: legacy
      POSTGRES_MULTIPLE_DATABASES: "legacy,keycloak,umami"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legacy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis — file de jobs BullMQ (PDF, e-mails, exports, rappels, notifications)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: legacy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — stockage documentaire compatible S3 (coffre-fort de documents)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: legacy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-legacy_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Crée automatiquement le bucket documentaire au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: legacy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set legacy http://minio:9000 ${MINIO_ACCESS_KEY:-legacy_minio_admin} ${MINIO_SECRET_KEY:-change_me_minio_secret} &&
      mc mb --ignore-existing legacy/${MINIO_BUCKET:-legacy-documents} &&
      mc anonymous set none legacy/${MINIO_BUCKET:-legacy-documents} &&
      exit 0
      "

  # ---------------------------------------------------------------------------
  # Keycloak — authentification, rôles, organisations, 2FA, SSO
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: legacy-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: legacy
      KC_DB_PASSWORD: legacy
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change_me_keycloak_admin}
      # Options d'hostname "v2" (Keycloak >= 26) : une URL complète plutôt que
      # KC_HOSTNAME_PORT (déprécié, cause une erreur de configuration).
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Umami — statistiques d'audience auto-hébergées, respectueuses du RGPD
  # (pas de cookies, pas de données personnelles collectées)
  # ---------------------------------------------------------------------------
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: legacy-umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://legacy:legacy@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${JWT_SECRET:-change_me_generate_a_long_random_secret}
    ports:
      - "8081:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Mailhog — boîte mail de test locale (SMTP), pour ne jamais envoyer de vrais
  # e-mails en développement
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: legacy-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI web

  # ---------------------------------------------------------------------------
  # Adminer — interface légère d'administration PostgreSQL (dev uniquement)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: legacy-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # API — NestJS (voir /api)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: development
    container_name: legacy-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://legacy:legacy@postgres:5432/legacy?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ../api:/app/api
      - ../packages:/app/packages
      - ../database:/app/database
      - /app/api/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
